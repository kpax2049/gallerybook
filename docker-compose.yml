services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres_db:5432/nest_db?schema=public
      PORT: 3333
    ports:
      - 3333:3333
    depends_on:
      - postgres_db
    networks:
      - gallerybook
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - 80:80
  #   networks:
  #     - gallerybook
  postgres_db:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: nest_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: 
      - 5434:5432
    networks:
      - gallerybook
  test_db:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: nest_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports: 
      - 5435:5432
    networks:
      - gallerybook

volumes:
  postgres_data:
  postgres_test_data:
networks:
  gallerybook:
