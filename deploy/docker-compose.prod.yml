services:
  gallerybook-postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ${GALLERYBOOK_ENV_FILE:-/opt/gallerybook/env/production.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gallerybook}
      POSTGRES_USER: ${POSTGRES_USER:-gallerybook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /opt/gallerybook/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-gallerybook} -d $${POSTGRES_DB:-gallerybook}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - gallerybook

  gallerybook-backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - ${GALLERYBOOK_ENV_FILE:-/opt/gallerybook/env/production.env}
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    expose:
      - "3333"
    depends_on:
      gallerybook-postgres:
        condition: service_healthy
    networks:
      - gallerybook
      - loramapr_internal

  gallerybook-frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_S3_DOMAIN: ${VITE_S3_DOMAIN:?VITE_S3_DOMAIN is required}
        VITE_S3_FOLDER: ${VITE_S3_FOLDER:-uploads/}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:?VITE_TURNSTILE_SITE_KEY is required}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - gallerybook-backend
    networks:
      - gallerybook
      - loramapr_internal

networks:
  gallerybook:
    driver: bridge
  loramapr_internal:
    external: true
